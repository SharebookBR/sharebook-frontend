<div [hidden]="!isLoading">
  <em class="fa fa-spinner fa-spin" style="position: absolute; left: 50%"></em>
</div>

<div class="container" [hidden]="isLoading">
  <h1 class="text-center display-4">
    Seus resultados para <strong>{{ criteria }}</strong>
  </h1>
  <section class="row" *ngIf="books.length === 0">
    <div class="col-xs-12 col-md-8 offset-md-2">
      <div class="alert alert-info mt-4">
        <strong>Não temos esse título gratuito no Sharebook.</strong><br />
        Mas você pode comprar sua cópia na Amazon — e parte do valor nos ajuda a manter o ShareBook gratuito.
        <div class="mt-3">
          <a
            mat-flat-button
            color="primary"
            [href]="getAmazonLink()"
            target="_blank"
            rel="noopener noreferrer sponsored"
            (click)="onAmazonClick()"
          >
            <mat-icon>shopping_cart</mat-icon> Comprar na Amazon
          </a>
        </div>
      </div>
    </div>
  </section>
  <section class="row justify-content-center book-covers">
    <app-book-card [book]="book" *ngFor="let book of books"></app-book-card>
  </section>
</div>
