<div class="close">
  <i class="fa fa-times" aria-hidden="true" mat-dialog-close></i>
</div>
<form [formGroup]="formGroup" (ngSubmit)="onDonate()">
  <h4 mat-dialog-title class="donate-title">Motivo da doação para {{ userNickName }}</h4>

  <mat-dialog-content>
    <div class="text-center" [hidden]="!isLoading"><i class="fa fa-spinner fa-spin"></i> Aguarde...</div>
    <p class="donate-help">Explique por que você escolheu essa pessoa. Isso ajuda a registrar a decisão com clareza.</p>

    <textarea
      formControlName="myNote"
      name="myNote"
      type="text"
      id="myNote"
      class="md-textarea form-control"
      rows="3"
      maxlength="2000"
    ></textarea>
    <div *ngIf="formGroup.controls['myNote'].touched && !formGroup.controls['myNote'].valid">
      <small class="form-text text-danger" *ngIf="formGroup.controls['myNote'].hasError('required')">
        Informe o motivo da doação.
      </small>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-flat-button color="primary" [disabled]="!formGroup.valid || isLoading" type="submit">Doar</button>
    <button mat-stroked-button mat-dialog-close type="button">Cancelar</button>
  </mat-dialog-actions>
</form>
