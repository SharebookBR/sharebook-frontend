<div class="close">
  <i class="fa fa-times" aria-hidden="true" mat-dialog-close></i>
</div>
<h4 mat-dialog-title class="donor-title">Informações do doador do livro</h4>
<mat-dialog-content>
  <h4 class="donor-book-title">{{ bookTitle }}</h4>
  <section class="card-body">
    <div [hidden]="!loading">
      <div class="text-center"><em class="fa fa-spinner fa-spin"></em> Aguarde...</div>
    </div>

    <ng-container *ngIf="messageBody !== ''">
      <h5 class="card-title">{{ messageBody }}</h5>
    </ng-container>

    <ng-container *ngIf="(userInfo$ | async)?.donor as donor">
      <h5 class="card-title">Doador</h5>
      <p class="card-text"><strong>Nome:</strong> {{ donor.name }}</p>
      <p class="card-text"><strong>E-mail:</strong> {{ donor.email }}</p>
      <p class="card-text"><strong>LinkedIn:</strong> {{ donor.linkedin }}</p>
      <p class="card-text"><strong>Telefone:</strong> {{ donor.phone }}</p>
      <button
        mat-flat-button
        class="card-whatsapp-btn"
        [disabled]="!hasWhatsappPhone(donor)"
        (click)="contactOnWhatsapp(donor)">
        <em class="fa fa-whatsapp" aria-hidden="true"></em>
        Chamar no WhatsApp
      </button>
    </ng-container>
  </section>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" mat-dialog-close>Ok, entendi</button>
</mat-dialog-actions>
